<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── Identity ──────────────────────────────────────────────── -->
    <title>IFA Backtest Engine — Insight Fusion Analytics</title>
    <meta
      name="description"
      content="Insight Fusion Analytics' backtest engine — design, run and review systematic trading strategies. Client portal for IFA's research, delivery and live engine workflows."
    />
    <meta name="author" content="Insight Fusion Analytics" />
    <meta name="theme-color" content="#7c6cff" />
    <meta name="color-scheme" content="light dark" />

    <!-- ── Favicons / app icons ──────────────────────────────────── -->
    <!-- IFA brand mark (Arial Black-style purple "IFA" on a rounded white tile).
         Multiple sizes so every surface (tab, retina, iOS home screen, Android)
         gets the sharpest version it can.
         The ?v=2 cache-bust forces browsers off any stale Vite-era favicon. -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png?v=2" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png?v=2" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon-180.png?v=2" />
    <link rel="mask-icon" href="/favicon.svg?v=2" color="#7c6cff" />
    <!-- Used as the og:image preview for Slack/WhatsApp/LinkedIn link unfurls. -->
    <link rel="shortcut icon" href="/favicon-512.png?v=2" />

    <!-- ── Open Graph (shows up in Slack / WhatsApp / LinkedIn previews) ── -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="IFA Backtest Engine" />
    <meta property="og:title" content="IFA Backtest Engine" />
    <meta
      property="og:description"
      content="Client portal for Insight Fusion Analytics' systematic trading research, backtests and engine runs."
    />
    <meta property="og:url" content="https://backtestingengine.insightfusionanalytics.com" />
    <meta property="og:image" content="https://backtestingengine.insightfusionanalytics.com/favicon-512.png" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />
    <meta property="og:image:type" content="image/png" />

    <!-- ── Twitter card (for X/Twitter previews) ─────────────────── -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="IFA Backtest Engine" />
    <meta
      name="twitter:description"
      content="Client portal for Insight Fusion Analytics' systematic trading research and backtests."
    />
    <meta name="twitter:image" content="https://backtestingengine.insightfusionanalytics.com/favicon-512.png" />

    <!-- ── Search-engine hints ───────────────────────────────────── -->
    <!-- This is a private client portal — keep it OUT of search indexes.
         Flip to "index, follow" if you ever publish a marketing landing page. -->
    <meta name="robots" content="noindex, nofollow" />
    <link rel="canonical" href="https://backtestingengine.insightfusionanalytics.com" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
