<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Insight Fusion Analytics — IFA brand mark for the Backtest Engine.
       Designed to read clearly at 16x16 (browser tab) while still looking good
       at 180x180 (apple-touch-icon) and on social cards. Pure SVG, no fonts
       bundled — uses the OS sans-serif stack so it stays crisp at any size. -->
  <defs>
    <linearGradient id="ifa-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#a89aff"/>
      <stop offset="55%"  stop-color="#7c6cff"/>
      <stop offset="100%" stop-color="#5b46d6"/>
    </linearGradient>
  </defs>
  <!-- Rounded white tile so the mark looks right on dark and light backgrounds. -->
  <rect width="128" height="128" rx="24" fill="#ffffff"/>
  <!-- "IFA" wordmark, slightly negative letter-spacing so the three letters
       read as one mark even at tiny sizes. -->
  <text
    x="64"
    y="86"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-weight="900"
    font-size="58"
    fill="url(#ifa-grad)"
    text-anchor="middle"
    letter-spacing="-3"
  >IFA</text>
</svg>
