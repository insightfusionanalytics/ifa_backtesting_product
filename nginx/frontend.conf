# Inside the frontend container — serves the SPA build.
# The OUTER (host) Nginx reverse-proxies to this container + the backend.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Static assets — long cache
    location ~* \.(?:js|css|svg|png|jpg|jpeg|gif|ico|woff2?)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — all other paths return index.html so react-router can handle them
    location / {
        try_files $uri $uri/ /index.html;
    }
}
